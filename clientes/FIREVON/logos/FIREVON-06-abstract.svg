<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8C5A"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1F36"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>
  </defs>

  <!-- Abstract Symbol - F/V fusion -->
  <g transform="translate(75, 30)">
    <!-- F shape -->
    <path d="M0 0 L50 0 L50 25 L22 25 L22 40 L50 40 L50 55 L22 55 L22 75 L0 75 Z" fill="url(#fireGrad)"/>

    <!-- V shape forming arrow -->
    <path d="M70 0 L105 0 L87.5 45 Z" fill="#00D4C7"/>
    <path d="M105 75 L70 75 L87.5 30 Z" fill="url(#navyGrad)"/>

    <!-- Teal accent bar -->
    <rect x="75" y="85" width="35" height="5" rx="2.5" fill="#00D4C7"/>
  </g>

  <!-- Brand name -->
  <text x="150" y="170" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="20" letter-spacing="8" fill="#1A1F36">FIREVON</text>

  <!-- Tagline -->
  <text x="150" y="190" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="10" letter-spacing="3" fill="#718096">PREVISIBILIDADE EM EXECUÇÃO</text>
</svg>

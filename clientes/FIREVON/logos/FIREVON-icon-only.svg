<!-- Minimal icon version for app icons, favicons, social media -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#1A1F36"/>
      <stop offset="100%" style="stop-color:#00D4C7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#iconGrad)"/>

  <!-- FV letters negative space -->
  <path d="M50 60 L50 140 L90 140 L90 125 L70 125 L70 110 L90 110 L90 95 L70 95 L70 75 L95 75 L95 60 Z" fill="white"/>
  <path d="M150 60 L115 60 L97.5 125 L80 60 L60 60 L90 150 L110 150 L130 95 L150 150 L170 60 Z" fill="white" opacity="0.9"/>
</svg>

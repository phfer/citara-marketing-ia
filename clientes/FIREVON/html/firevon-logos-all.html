<!DOCTYPE html>
<html>
<head>
    <title>FIREVON Logos - High Resolution Export</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .logo-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo-container h3 {
            margin-top: 15px;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Variation 1: Wordmark Minimal */
        .v1 svg { width: 400px; height: 120px; }
        /* Variation 2: Camel Case */
        .v2 svg { width: 400px; height: 120px; }
        /* Variation 3: Monogram */
        .v3 svg { width: 200px; height: 200px; }
        /* Variation 4: Lowcase */
        .v4 svg { width: 400px; height: 100px; }
        /* Variation 5: Two Words */
        .v5 svg { width: 400px; height: 100px; }
        /* Variation 6: Abstract */
        .v6 svg { width: 300px; height: 200px; }
    </style>
</head>
<body>
    <div class="logo-container v1">
        <svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
            <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="48" letter-spacing="8" fill="#1A1F36">FIREVON</text>
            <rect x="50" y="85" width="300" height="4" rx="2" fill="#FF6B35"/>
        </svg>
        <h3>01 - Wordmark Minimal</h3>
    </div>

    <div class="logo-container v2">
        <svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
            <text x="200" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="56">
                <tspan font-weight="700" fill="#FF6B35">Fire</tspan><tspan font-weight="400" fill="#1A1F36">Von</tspan>
            </text>
        </svg>
        <h3>02 - Camel Case</h3>
    </div>

    <div class="logo-container v3">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="20" width="160" height="160" rx="32" fill="#1A1F36"/>
            <path d="M50 55 L50 145 L95 145 L95 130 L68 130 L68 110 L95 110 L95 95 L68 95 L68 70 L95 70 L95 55 Z" fill="#FF6B35"/>
            <path d="M150 55 L115 145 L95 145 L60 55 L80 55 L105 120 L130 55 Z" fill="#00D4C7" opacity="0.9"/>
            <circle cx="155" cy="150" r="6" fill="#FF6B35"/>
        </svg>
        <h3>03 - Monogram FV</h3>
    </div>

    <div class="logo-container v4">
        <svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
            <text x="200" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="52" letter-spacing="12" fill="#00D4C7">firevon</text>
        </svg>
        <h3>04 - Lowcase</h3>
    </div>

    <div class="logo-container v5">
        <svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
            <text x="200" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="42" letter-spacing="6" fill="#1A1F36">
                FIRE<tspan fill="#FF6B35"> · </tspan>VON
            </text>
        </svg>
        <h3>05 - Two Words</h3>
    </div>

    <div class="logo-container v6">
        <svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(75, 30)">
                <path d="M0 0 L50 0 L50 25 L22 25 L22 40 L50 40 L50 55 L22 55 L22 75 L0 75 Z" fill="#FF6B35"/>
                <path d="M70 0 L105 0 L87.5 45 Z" fill="#00D4C7"/>
                <path d="M105 75 L70 75 L87.5 30 Z" fill="#1A1F36"/>
                <rect x="75" y="85" width="35" height="5" rx="2.5" fill="#00D4C7"/>
            </g>
            <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="20" letter-spacing="8" fill="#1A1F36">FIREVON</text>
        </svg>
        <h3>06 - Abstract Symbol</h3>
    </div>

    <!-- Dark mode versions -->
    <div class="logo-container" style="background: #1A1F36;">
        <svg width="350" height="100" viewBox="0 0 350 100" xmlns="http://www.w3.org/2000/svg">
            <text x="175" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="40" letter-spacing="6" fill="white">FIREVON</text>
            <rect x="40" y="75" width="270" height="3" rx="1.5" fill="#FF6B35"/>
        </svg>
        <h3 style="color: white;">Dark Mode - Wordmark</h3>
    </div>

    <div class="logo-container" style="background: #1A1F36;">
        <svg width="350" height="100" viewBox="0 0 350 100" xmlns="http://www.w3.org/2000/svg">
            <text x="175" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="48" letter-spacing="10" fill="#00D4C7">firevon</text>
        </svg>
        <h3 style="color: white;">Dark Mode - Lowcase</h3>
    </div>

    <div class="logo-container" style="background: #1A1F36;">
        <svg width="350" height="80" viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg">
            <text x="175" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="36" letter-spacing="5" fill="white">
                FIRE<tspan fill="#FF6B35"> · </tspan>VON
            </text>
        </svg>
        <h3 style="color: white;">Dark Mode - Two Words</h3>
    </div>

    <!-- Icon/App version -->
    <div class="logo-container">
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <rect width="120" height="120" rx="24" fill="#1A1F36"/>
            <text x="60" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="40" letter-spacing="4" fill="white">FV</text>
            <rect x="30" y="90" width="60" height="4" rx="2" fill="#FF6B35"/>
        </svg>
        <h3>App Icon</h3>
    </div>

    <!-- Favicon 32x32 -->
    <div class="logo-container">
        <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="6" fill="#1A1F36"/>
            <text x="16" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" letter-spacing="1" fill="white">FV</text>
        </svg>
        <h3>Favicon</h3>
    </div>
</body>
</html>
